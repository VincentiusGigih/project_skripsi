<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin HRD - PayrollFace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PayrollFace - Admin</div>
        <ul>
            <li><a href="#" onclick="showSection('enroll')">Kelola Karyawan</a></li>
            <li><a href="#" onclick="showSection('approval')">Persetujuan Cuti</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <section id="section-enroll">
            <div class="card">
                <h2>Enrollment Karyawan Baru</h2>
                <p style="margin-bottom: 20px; color: #666;">Daftarkan data biometrik wajah ke dalam sistem.</p>
                <div style="display: flex; gap: 30px; align-items: flex-start;">
                    <div style="flex: 1;">
                        <div class="form-group">
                            <label>Nomor Induk Karyawan (NIK)</label>
                            <input type="text" placeholder="Contoh: 2602100354">
                        </div>
                        <div class="form-group">
                            <label>Nama Lengkap</label>
                            <input type="text" placeholder="Contoh: Vincentius Gigih">
                        </div>
                        <button class="btn-scan btn-block">Ambil Sampel Wajah</button>
                    </div>
                    <div style="flex: 1; text-align: center;">
                        <video id="admin-video" autoplay muted style="width: 100%; border-radius: 10px; background: black;"></video>
                        <p id="enroll-status" style="margin-top: 10px;">Kamera Siap</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-approval" style="display:none;">
            <div class="card">
                <h2>Persetujuan Cuti Karyawan</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Karyawan</th>
                            <th>Jenis Cuti</th>
                            <th>Tanggal</th>
                            <th>Alasan/Dokumen</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="admin-list-cuti"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="camera.js"></script>
    <script>
        initCamera('admin-video');
        function showSection(name) {
            document.getElementById('section-enroll').style.display = name === 'enroll' ? 'block' : 'none';
            document.getElementById('section-approval').style.display = name === 'approval' ? 'block' : 'none';
            if(name === 'approval') loadAdminCuti();
        }

        function loadAdminCuti() {
            const list = document.getElementById('admin-list-cuti');
            let data = JSON.parse(localStorage.getItem('dataCuti')) || [];
            list.innerHTML = data.reverse().map(c => `
                <tr>
                    <td><b>${c.karyawan}</b></td>
                    <td>${c.jenis}</td>
                    <td>${c.tanggal}</td>
                    <td>
                        <small>${c.alasan}</small><br>
                        ${c.attachment ? `<a href="${c.attachment}" target="_blank" style="color:var(--success); font-size:0.7rem;">[Lihat Dokumen]</a>` : ''}
                    </td>
                    <td>
                        ${c.status === 'Pending' ? `
                            <button onclick="updateCuti(${c.id}, 'Approved')" style="color:green; border:none; background:none; cursor:pointer;">Setujui</button> | 
                            <button onclick="updateCuti(${c.id}, 'Rejected')" style="color:red; border:none; background:none; cursor:pointer;">Tolak</button>
                        ` : `<span class="badge ${c.status.toLowerCase()}">${c.status}</span>`}
                    </td>
                </tr>
            `).join('');
        }

        function updateCuti(id, status) {
            let data = JSON.parse(localStorage.getItem('dataCuti')) || [];
            const index = data.findIndex(item => item.id === id);
            if (index !== -1) {
                data[index].status = status;
                localStorage.setItem('dataCuti', JSON.stringify(data));
                alert("Status diperbarui!");
                loadAdminCuti();
            }
        }
    </script>
</body>
</html>
