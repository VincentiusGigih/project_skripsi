<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin HRD - PayrollFace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PayrollFace - Admin</div>
        <ul>
            <li><a href="#" onclick="showSection('enroll')">Kelola Karyawan</a></li>
            <li><a href="#" onclick="showSection('approval')">Persetujuan Cuti</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <section id="section-enroll">
            <div class="card">
                <h2>Enrollment Karyawan Baru</h2>
                <p style="margin-bottom: 20px; color: #666;">Daftarkan data biometrik wajah ke dalam sistem.</p>
                <div style="display: flex; gap: 30px; align-items: flex-start;">
                    <div style="flex: 1;">
                        <div class="form-group">
                            <label>Nomor Induk Karyawan (NIK)</label>
                            <input type="text" placeholder="Contoh: 2602100354">
                        </div>
                        <div class="form-group">
                            <label>Nama Lengkap</label>
                            <input type="text" placeholder="Contoh: Vincentius Gigih">
                        </div>
                        <button class="btn-scan btn-block">Ambil Sampel Wajah</button>
                    </div>
                    <div style="flex: 1; text-align: center;">
                        <video id="admin-video" autoplay muted style="width: 100%; border-radius: 10px; background: black;"></video>
                        <p id="enroll-status" style="margin-top: 10px;">Kamera Siap</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-approval" style="display:none;">
            <div class="card">
                <h2>Persetujuan Cuti Karyawan</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Karyawan</th>
                            <th>Jenis Cuti</th>
                            <th>Tanggal</th>
                            <th>Alasan/Dokumen</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="admin-list-cuti"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="camera.js"></script>
    <script>
        initCamera('admin-video');

        async function handleEnroll() {
            const nik = document.querySelector('input[placeholder*="NIK"]').value;
            const nama = document.querySelector('input[placeholder*="Nama"]').value;
            const video = document.getElementById('admin-video');
            const canvas = document.createElement('canvas');
            
            if(!nik || !nama) return alert("Harap isi NIK dan Nama!");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const res = await fetch('http://localhost:5000/api/v1/face/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nik: nik,
                    nama: nama,
                    gaji: 8500000, // Gaji default
                    image: canvas.toDataURL('image/jpeg')
                })
            });
            const result = await res.json();
            alert(result.message);
        }

        // Pasang fungsi ke tombol "Ambil Sampel Wajah"
        document.querySelector('.btn-block').onclick = handleEnroll;
    </script>
</body>
</html>
