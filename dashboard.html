<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Absensi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PayrollFace</div>
        <ul>
            <li><a href="dashboard.html">Absensi</a></li>
            <li><a href="rekap_kehadiran.html">Rekap</a></li>
            <li><a href="pengajuan_cuti.html">Cuti</a></li>
            <li id="menu-slip" class="nav-hidden"><a href="slip_gaji.html">Slip Gaji</a></li>
            <li><a href="index.html" onclick="localStorage.removeItem('hasAbsen')">Keluar</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card" style="text-align: center; max-width: 550px;">
            <h2 style="margin-bottom: 20px;">Presensi Biometrik</h2>
            <div class="form-group">
                <select id="absensi_type">
                    <option value="Masuk">Absensi Masuk</option>
                    <option value="Pulang">Absensi Pulang (Keluar)</option>
                </select>
            </div>
            <p id="camera-hint" style="font-size: 0.9rem; color: #3498db; margin-bottom: 8px;">Menghubungkan kamera...</p>
            <video id="video" autoplay muted playsinline style="width: 100%; border-radius: 10px; background: black; margin-bottom: 15px;"></video>
            <button id="btn-scan" class="btn-scan btn-block">Mulai Verifikasi Wajah</button>
            <h3 id="status" style="margin-top:20px; color: #7f8c8d;">Status: Siap memindai...</h3>
        </div>
    </div>

    <script src="camera.js"></script>
    <script>
        initCamera('video', 'camera-hint');
        document.getElementById('btn-scan').onclick = () => {
            const type = document.getElementById('absensi_type').value;
            simulateVerification('status', type);
        };
    </script>
</body>
</html>
