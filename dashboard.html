<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Karyawan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <h2>Panel Karyawan</h2>
            <ul>
                <li><a href="dashboard.html"><b>Presensi Wajah</b></a></li>
                <li id="menu-slip-gaji" class="hidden"><a href="slip_gaji.html">Lihat Slip Gaji</a></li>
            </ul>
            <a href="index.html" class="btn btn-logout" style="text-align:center;">Logout</a>
        </nav>
        <main class="content">
            <h1>Presensi Kehadiran</h1>
            <div class="card">
                <h3>Scan Wajah (Real-time)</h3>
                <p>Pastikan wajah berada di area frame dan lakukan kedipan mata.</p>
                <video id="video" autoplay muted></video>
                <div style="margin-top: 15px;">
                    <button id="btn-scan" class="btn btn-primary">Mulai Verifikasi</button>
                    <h3 id="status" style="color: #7f8c8d;">Status: Menunggu...</h3>
                </div>
            </div>
        </main>
    </div>
    <script src="camera.js"></script>
    <script>
        initCamera('video');
        document.getElementById('btn-scan').onclick = () => simulateVerification('status');
    </script>
</body>
</html>
