<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengajuan Cuti - PayrollFace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PayrollFace</div>
        <ul>
            <li><a href="dashboard.html">Absensi</a></li>
            <li><a href="rekap_kehadiran.html">Rekap</a></li>
            <li><a href="pengajuan_cuti.html">Cuti</a></li>
            <li id="menu-slip" class="nav-hidden"><a href="slip_gaji.html">Slip Gaji</a></li>
            <li><a href="index.html" onclick="localStorage.removeItem('hasAbsen')">Keluar</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 15px; color: #2c3e50; border-bottom: 2px solid #f4f7f6; padding-bottom: 10px;">
                Formulir Pengajuan Cuti
            </h2>
            <div id="cuti-user-info" style="margin-bottom:15px;color:#666;font-size:0.9rem;"></div>
            
            <div class="form-group">
                <label for="jenis_cuti">Jenis Cuti</label>
                <select id="jenis_cuti" onchange="toggleUploadSurat()">
                    <option value="Cuti Tahunan">Cuti Tahunan</option>
                    <option value="Cuti Sakit">Cuti Sakit</option>
                    <option value="Kepentingan Mendesak">Kepentingan Mendesak</option>
                </select>
            </div>

            <div id="upload-section" class="form-group" style="display: none; background: #fdf2f2; padding: 15px; border-radius: 8px; border: 1px dashed #e74c3c;">
                <label for="surat_dokter" style="color: #e74c3c;">Upload Surat Dokter (Wajib untuk Cuti Sakit)</label>
                <input type="file" id="surat_dokter" accept="image/*,application/pdf">
            </div>

            <div class="form-group">
                <label for="tgl_mulai">Tanggal Mulai</label>
                <input type="date" id="tgl_mulai">
            </div>

            <div class="form-group">
                <label for="alasan">Alasan Cuti</label>
                <textarea id="alasan" placeholder="Tuliskan alasan detail pengambilan cuti Anda..."></textarea>
            </div>

            <button class="btn-scan btn-block" onclick="submitCuti()">Kirim Pengajuan ke HRD</button>
        </div>

        <div class="card" style="margin-top: 30px;">
            <h3 style="margin-bottom: 20px; color: #2c3e50;">Riwayat Status Pengajuan</h3>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Jenis</th>
                        <th>Alasan/Dokumen</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="list-cuti"></tbody>
            </table>
        </div>
    </div>

    <script>
        function getUserId() {
            return localStorage.getItem('current_user_id');
        }

        function toggleUploadSurat() {
            const jenis = document.getElementById('jenis_cuti').value;
            const uploadSection = document.getElementById('upload-section');
            uploadSection.style.display = (jenis === 'Cuti Sakit') ? 'block' : 'none';
        }

        async function submitCuti() {
            const userId = getUserId();
            if (!userId) { alert("Silakan absensi dulu agar sistem mengenali Anda."); return; }

            const tgl = document.getElementById('tgl_mulai').value;
            const als = document.getElementById('alasan').value;
            const jenis = document.getElementById('jenis_cuti').value;
            const fileInput = document.getElementById('surat_dokter');
            let attachmentBase64 = null;

            if(!tgl || !als) {
                alert("Harap lengkapi tanggal dan alasan cuti!");
                return;
            }

            if (jenis === 'Cuti Sakit') {
                if (fileInput.files.length === 0) {
                    alert("Wajib mengunggah surat dokter!");
                    return;
                }
                attachmentBase64 = await toBase64(fileInput.files[0]);
            }

            try {
                const res = await fetch('/api/v1/leave/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        jenis: jenis,
                        tanggal: tgl,
                        alasan: als,
                        attachment: attachmentBase64
                    })
                });
                const result = await res.json();
                alert(result.message);
                loadCutiSaya();
            } catch (error) {
                alert("Server Offline!");
            }
        }

        async function cancelCuti(id) {
            if(!confirm("Yakin ingin membatalkan pengajuan ini?")) return;

            try {
                await fetch('/api/v1/leave/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ leave_id: id })
                });
                alert("Pengajuan dibatalkan.");
                loadCutiSaya();
            } catch (error) {
                alert("Gagal menghubungi server.");
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function loadCutiSaya() {
            const tbody = document.getElementById('list-cuti');
            const userId = getUserId();

            if (!userId) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#999;">Silakan absensi dulu untuk melihat data cuti.</td></tr>';
                return;
            }

            try {
                const res = await fetch(`/api/v1/leave/my/${userId}`);
                const data = await res.json();

                if (!data.leaves || data.leaves.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#999;">Belum ada pengajuan cuti.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.leaves.map(c => `
                    <tr>
                        <td>${c.tanggal}</td>
                        <td>${c.jenis_cuti}</td>
                        <td>
                            <small>${c.alasan || '-'}</small><br>
                            ${c.attachment ? `<a href="${c.attachment}" target="_blank" style="color:var(--secondary);font-size:0.7rem;">📄 Lihat Surat</a>` : ''}
                        </td>
                        <td><span class="badge ${c.status.toLowerCase()}">${c.status}</span></td>
                        <td>
                            ${c.status === 'Pending' ? `<button class="btn-cancel" onclick="cancelCuti(${c.id})">Batalkan</button>` : '-'}
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#e74c3c;">Gagal memuat data. Pastikan server berjalan.</td></tr>';
            }
        }

        async function loadUserInfo() {
            const userId = getUserId();
            if (!userId) return;
            try {
                const res = await fetch(`/api/v1/employee/data/${userId}`);
                const data = await res.json();
                if (data.user) {
                    document.getElementById('cuti-user-info').innerHTML =
                        `<b>Nama</b>: ${data.user.nama} &nbsp;|&nbsp; <b>NIK</b>: ${data.user.nik}`;
                }
            } catch (e) {}
        }

        window.onload = () => { loadUserInfo(); loadCutiSaya(); };
    </script>
</body>
</html>
