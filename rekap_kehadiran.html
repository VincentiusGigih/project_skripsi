<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rekap Kehadiran - PayrollFace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PayrollFace</div>
        <ul>
            <li><a href="dashboard.html">Absensi</a></li>
            <li><a href="rekap_kehadiran.html">Rekap</a></li>
            <li><a href="pengajuan_cuti.html">Cuti</a></li>
            <li id="menu-slip"><a href="slip_gaji.html">Slip Gaji</a></li>
            <li><a href="index.html">Keluar</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Riwayat Kehadiran Anda</h2>
            <p id="user-info">Memuat data...</p>
            <table>
                <thead>
                    <tr><th>Tanggal</th><th>Jam Masuk</th><th>Jam Keluar</th><th>Status</th></tr>
                </thead>
                <tbody id="log-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadLogs() {
            const userId = sessionStorage.getItem('current_user_id');
            if(!userId) {
                alert("Silakan login/absensi dulu!");
                window.location.href = 'dashboard.html';
                return;
            }

            const res = await fetch(`http://localhost:5000/api/v1/employee/data/${userId}`);
            const data = await res.json();
            
            document.getElementById('user-info').innerText = `Karyawan: ${data.user.nama} (${data.user.nik})`;
            const tbody = document.getElementById('log-table-body');
            
            tbody.innerHTML = data.logs.map(log => `
                <tr>
                    <td>${log.tanggal}</td>
                    <td style="color: #27ae60; font-weight: bold;">${log.jam_masuk || '-'}</td>
                    <td style="color: #e67e22; font-weight: bold;">${log.jam_keluar || '-'}</td>
                    <td><span class="badge approved">${log.status}</span></td>
                </tr>
            `).join('');
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
