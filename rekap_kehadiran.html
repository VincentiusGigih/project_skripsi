<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rekap Kehadiran - PayrollFace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PayrollFace</div>
        <ul>
            <li><a href="dashboard.html">Absensi</a></li>
            <li><a href="rekap_kehadiran.html">Rekap</a></li>
            <li><a href="pengajuan_cuti.html">Cuti</a></li>
            <li id="menu-slip"><a href="slip_gaji.html">Slip Gaji</a></li>
            <li><a href="index.html">Keluar</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Riwayat Kehadiran Anda</h2>
            <div id="user-info">Memuat data...</div>
            <p style="color:#666;font-size:0.9rem;">Jam kerja standar: <b>09:00</b> - <b>18:00</b></p>
            <table>
                <thead>
                    <tr><th>Tanggal</th><th>Jam Masuk</th><th>Jam Keluar</th><th>Status</th><th>Keterangan</th></tr>
                </thead>
                <tbody id="log-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const JAM_MASUK_STANDAR = "09:00:00";
        const JAM_PULANG_STANDAR = "18:00:00";

        function timeToMinutes(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        function formatDuration(totalMinutes) {
            const jam = Math.floor(totalMinutes / 60);
            const menit = totalMinutes % 60;
            if (jam > 0 && menit > 0) return `${jam} jam ${menit} menit`;
            if (jam > 0) return `${jam} jam`;
            return `${menit} menit`;
        }

        function getKeterangan(jamMasuk, jamKeluar) {
            const notes = [];
            const masukStandar = timeToMinutes(JAM_MASUK_STANDAR);
            const pulangStandar = timeToMinutes(JAM_PULANG_STANDAR);

            if (jamMasuk) {
                const masukActual = timeToMinutes(jamMasuk);
                if (masukActual > masukStandar) {
                    const telat = masukActual - masukStandar;
                    notes.push(`<span style="color:#e74c3c;">Terlambat ${formatDuration(telat)}</span>`);
                } else if (masukActual <= masukStandar) {
                    notes.push(`<span style="color:#27ae60;">Tepat waktu</span>`);
                }
            }

            if (jamKeluar) {
                const keluarActual = timeToMinutes(jamKeluar);
                if (keluarActual > pulangStandar) {
                    const lembur = keluarActual - pulangStandar;
                    notes.push(`<span style="color:#2980b9;">Lembur ${formatDuration(lembur)}</span>`);
                } else if (keluarActual < pulangStandar) {
                    const pulangCepat = pulangStandar - keluarActual;
                    notes.push(`<span style="color:#e67e22;">Pulang cepat ${formatDuration(pulangCepat)}</span>`);
                }
            } else {
                notes.push(`<span style="color:#95a5a6;">Belum absen pulang</span>`);
            }

            return notes.join('<br>');
        }

        async function loadLogs() {
            const userId = localStorage.getItem('current_user_id');
            if(!userId) {
                alert("Silakan login/absensi dulu!");
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                const res = await fetch(`http://localhost:5000/api/v1/employee/data/${userId}`);
                const data = await res.json();

                if (!data.user) {
                    document.getElementById('user-info').innerText = 'Data karyawan tidak ditemukan.';
                    return;
                }

                document.getElementById('user-info').innerHTML = `
                    <p style="margin:4px 0;"><b>Nama</b>: ${data.user.nama}</p>
                    <p style="margin:4px 0;"><b>NIK</b>: ${data.user.nik}</p>
                `;
                const tbody = document.getElementById('log-table-body');

                if (!data.logs || data.logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#999;">Belum ada data kehadiran.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.logs.map(log => `
                    <tr>
                        <td>${log.tanggal}</td>
                        <td style="color: #27ae60; font-weight: bold;">${log.jam_masuk || '-'}</td>
                        <td style="color: #e67e22; font-weight: bold;">${log.jam_keluar || '-'}</td>
                        <td><span class="badge approved">${log.status}</span></td>
                        <td>${getKeterangan(log.jam_masuk, log.jam_keluar)}</td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('user-info').innerText = 'Gagal memuat data. Pastikan server berjalan.';
            }
        }
        window.onload = loadLogs;
    </script>
</body>
</html>
